<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whiteboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="app">
        <div class="toolbar">
            <div class="tool-group">
                <button class="tool-btn" data-tool="select" title="Seç (V)">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="lucide lucide-mouse-pointer-icon lucide-mouse-pointer">
                        <path d="M12.586 12.586 19 19" />
                        <path
                            d="M3.688 3.037a.497.497 0 0 0-.651.651l6.5 15.999a.501.501 0 0 0 .947-.062l1.569-6.083a2 2 0 0 1 1.448-1.479l6.124-1.579a.5.5 0 0 0 .063-.947z" />
                    </svg>
                </button>
                <button class="tool-btn" data-tool="hand" title="El (H)">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="lucide lucide-hand-icon lucide-hand">
                        <path d="M18 11V6a2 2 0 0 0-2-2a2 2 0 0 0-2 2" />
                        <path d="M14 10V4a2 2 0 0 0-2-2a2 2 0 0 0-2 2v2" />
                        <path d="M10 10.5V6a2 2 0 0 0-2-2a2 2 0 0 0-2 2v8" />
                        <path
                            d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15" />
                    </svg>
                </button>
            </div>

            <div class="tool-group">
                <button class="tool-btn active" data-tool="pen" title="Kalem (P)">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="lucide lucide-pencil-icon lucide-pencil">
                        <path
                            d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z" />
                        <path d="m15 5 4 4" />
                    </svg>
                </button>
                <button class="tool-btn" data-tool="highlighter" title="Vurgulayıcı Pen (H)">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="lucide lucide-highlighter-icon lucide-highlighter">
                        <path d="m9 11-6 6v3h9l3-3" />
                        <path d="m22 12-4.6 4.6a2 2 0 0 1-2.8 0l-5.2-5.2a2 2 0 0 1 0-2.8L14 4" />
                    </svg>
                </button>
                <button class="tool-btn" data-tool="eraser" title="Silgi (X)">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="lucide lucide-eraser-icon lucide-eraser">
                        <path
                            d="M21 21H8a2 2 0 0 1-1.42-.587l-3.994-3.999a2 2 0 0 1 0-2.828l10-10a2 2 0 0 1 2.829 0l5.999 6a2 2 0 0 1 0 2.828L12.834 21" />
                        <path d="m5.082 11.09 8.828 8.828" />
                    </svg>
                </button>
            </div>

            <div class="tool-group">
                <button class="tool-btn" data-tool="rectangle" title="Dikdörtgen (R)">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="lucide lucide-rectangle-horizontal-icon lucide-rectangle-horizontal">
                        <rect width="20" height="12" x="2" y="6" rx="2" />
                    </svg>
                </button>
                <button class="tool-btn" data-tool="ellipse" title="Elips (E)">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="lucide lucide-circle-icon lucide-circle">
                        <circle cx="12" cy="12" r="10" />
                    </svg>
                </button>
                <button class="tool-btn" data-tool="arrow" title="Ok (A)">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="lucide lucide-minus-icon lucide-minus">
                        <path d="M5 12h14" />
                    </svg>
                </button>
                <button class="tool-btn" data-tool="line" title="Çizgi (L)" style="display: none;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="lucide lucide-minus-icon lucide-minus">
                        <path d="M5 12h14" />
                    </svg>
                </button>
            </div>

            <div class="tool-group">
                <button class="tool-btn" id="canvasSettingsBtn" title="Tuval Ayarları (C)">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="lucide lucide-sliders-horizontal-icon lucide-sliders-horizontal">
                        <path d="M10 5H3" />
                        <path d="M12 19H3" />
                        <path d="M14 3v4" />
                        <path d="M16 17v4" />
                        <path d="M21 12h-9" />
                        <path d="M21 19h-5" />
                        <path d="M21 5h-7" />
                        <path d="M8 10v4" />
                        <path d="M8 12H3" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- NEW: Properties Sidebar (Right of Color Palette) -->
        <div id="propertiesSidebar" class="floating-sidebar properties-sidebar">
            <div class="tool-group">
                <span class="label">Kalınlık</span>
                <div class="slider-container">
                    <span class="slider-val-top" id="strokeWidthVal">4</span>
                    <input type="range" id="strokeWidth" min="1" max="20" value="4">
                    <span class="slider-val-bottom">0</span>
                </div>
            </div>

            <div class="tool-group">
                <span class="label">Opaklık</span>
                <div class="slider-container">
                    <span class="slider-val-top" id="opacityVal">100%</span>
                    <input type="range" id="opacitySlider" min="0" max="100" value="100" step="10">
                    <span class="slider-val-bottom">0</span>
                </div>
            </div>

            <div class="tool-group">
                <button class="tool-btn active" data-linestyle="solid" title="Düz Çizgi">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M4 12H20" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                    </svg>
                </button>
                <button class="tool-btn" data-linestyle="dashed" title="Kesik Çizgi">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M4 12L20 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-dasharray="4 3" />
                    </svg>
                </button>
                <button class="tool-btn" data-linestyle="dotted" title="Noktalı Çizgi">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M4 12L20 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-dasharray="0.1 3" />
                    </svg>
                </button>
                <button class="tool-btn" data-linestyle="dash-dot" title="Kesik-Nokta Çizgi">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M4 12L20 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                            stroke-dasharray="5 3 0.1 3" />
                    </svg>
                </button>
                <button class="tool-btn" data-linestyle="wavy" title="Dalgalı Çizgi">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M3 12Q6 7 9 12T15 12T21 12" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </button>
            </div>

            <div class="tool-group">
                <button class="tool-btn active" id="pressureBtn" title="Basınç Hassasiyeti">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22 12h-4l-3 9L9 3l-3 9H2" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </button>
            </div>

            <div class="tool-group" id="eraserSettings" style="display: none;">
                <label class="label">Silgi</label>
                <button class="tool-btn active" data-eraser-mode="object" title="Nesne Silgisi">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="5" y="5" width="14" height="14" rx="2" stroke="currentColor" stroke-width="2" />
                        <line x1="16" y1="8" x2="8" y2="16" stroke="currentColor" stroke-width="2" />
                    </svg>
                </button>
                <button class="tool-btn" data-eraser-mode="partial" title="Kısmi Silgi (Piksel)">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M4 12H20" stroke="currentColor" stroke-width="6" stroke-linecap="round"
                            stroke-opacity="0.3" />
                        <rect x="10" y="8" width="4" height="8" fill="white" stroke="currentColor" stroke-width="2" />
                    </svg>
                </button>
            </div>

            <div class="tool-group" id="highlighterSettings" style="display: none;">
                <label class="label">Uç</label>
                <button class="tool-btn active" data-highlighter-cap="round" title="Yuvarlak Uç">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <line x1="12" y1="4" x2="12" y2="20" stroke="currentColor" stroke-width="8"
                            stroke-linecap="round" />
                    </svg>
                </button>
                <button class="tool-btn" data-highlighter-cap="butt" title="Düz Uç">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <line x1="12" y1="4" x2="12" y2="20" stroke="currentColor" stroke-width="8"
                            stroke-linecap="butt" />
                    </svg>
                </button>
            </div>

            <div class="tool-group" id="arrowSettings"
                style="display: none; flex-direction: column; gap: 8px; width: 100%;">
                <!-- Start Style Wrap -->
                <div style="position: relative; width: 100%;">
                    <button id="btnArrowStartTrigger" class="property-trigger-btn" title="Başlangıç Ucu">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"
                            style="width: 20px; height: 20px;">
                            <path d="M18 12H6M6 12L10 8M6 12L10 16" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                    </button>
                    <div id="popupArrowStart" class="property-popup">
                        <button class="tool-btn active" data-arrow-start="none" title="Uç Yok">
                            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <line x1="4" y1="12" x2="20" y2="12" stroke="currentColor" stroke-width="2" />
                            </svg>
                        </button>
                        <button class="tool-btn" data-arrow-start="triangle" title="Dolu ok">
                            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <line x1="8" y1="12" x2="20" y2="12" stroke="currentColor" stroke-width="2" />
                                <path d="M8 12 L4 9 L4 15 Z" fill="currentColor" />
                            </svg>
                        </button>
                        <button class="tool-btn" data-arrow-start="line" title="Ok">
                            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <line x1="8" y1="12" x2="20" y2="12" stroke="currentColor" stroke-width="2" />
                                <line x1="4" y1="8" x2="4" y2="16" stroke="currentColor" stroke-width="2" />
                                <line x1="4" y1="10" x2="8" y2="12" stroke="currentColor" stroke-width="2" />
                                <line x1="4" y1="14" x2="8" y2="12" stroke="currentColor" stroke-width="2" />
                            </svg>
                        </button>
                        <button class="tool-btn" data-arrow-start="circle" title="Yuvarlak">
                            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <line x1="8" y1="12" x2="20" y2="12" stroke="currentColor" stroke-width="2" />
                                <circle cx="4" cy="12" r="3" fill="currentColor" />
                            </svg>
                        </button>
                        <button class="tool-btn" data-arrow-start="square" title="Kare">
                            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <line x1="8" y1="12" x2="20" y2="12" stroke="currentColor" stroke-width="2" />
                                <rect x="1" y="9" width="6" height="6" fill="currentColor" />
                            </svg>
                        </button>
                        <button class="tool-btn" data-arrow-start="bar" title="Dikey Çizgi">
                            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <line x1="6" y1="12" x2="20" y2="12" stroke="currentColor" stroke-width="2" />
                                <line x1="4" y1="8" x2="4" y2="16" stroke="currentColor" stroke-width="3" />
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- End Style Wrap -->
                <div style="position: relative; width: 100%;">
                    <button id="btnArrowEndTrigger" class="property-trigger-btn" title="Bitiş Ucu">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"
                            style="width: 20px; height: 20px;">
                            <path d="M6 12H18M18 12L14 8M18 12L14 16" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                    </button>
                    <div id="popupArrowEnd" class="property-popup">
                        <button class="tool-btn" data-arrow-end="none" title="Uç Yok">
                            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <line x1="4" y1="12" x2="20" y2="12" stroke="currentColor" stroke-width="2" />
                            </svg>
                        </button>
                        <button class="tool-btn active" data-arrow-end="triangle" title="Dolu ok">
                            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <line x1="4" y1="12" x2="16" y2="12" stroke="currentColor" stroke-width="2" />
                                <path d="M16 12 L20 9 L20 15 Z" fill="currentColor" />
                            </svg>
                        </button>
                        <button class="tool-btn" data-arrow-end="line" title="Ok">
                            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <line x1="4" y1="12" x2="16" y2="12" stroke="currentColor" stroke-width="2" />
                                <line x1="20" y1="8" x2="20" y2="16" stroke="currentColor" stroke-width="2" />
                                <line x1="16" y1="10" x2="20" y2="12" stroke="currentColor" stroke-width="2" />
                                <line x1="16" y1="14" x2="20" y2="12" stroke="currentColor" stroke-width="2" />
                            </svg>
                        </button>
                        <button class="tool-btn" data-arrow-end="circle" title="Yuvarlak">
                            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <line x1="4" y1="12" x2="16" y2="12" stroke="currentColor" stroke-width="2" />
                                <circle cx="20" cy="12" r="3" fill="currentColor" />
                            </svg>
                        </button>
                        <button class="tool-btn" data-arrow-end="square" title="Kare">
                            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <line x1="4" y1="12" x2="16" y2="12" stroke="currentColor" stroke-width="2" />
                                <rect x="17" y="9" width="6" height="6" fill="currentColor" />
                            </svg>
                        </button>
                        <button class="tool-btn" data-arrow-end="bar" title="Dikey Çizgi">
                            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <line x1="4" y1="12" x2="18" y2="12" stroke="currentColor" stroke-width="2" />
                                <line x1="20" y1="8" x2="20" y2="16" stroke="currentColor" stroke-width="3" />
                            </svg>
                        </button>
                    </div>
                </div>
            </div>



            <div class="tool-group" id="arrowPathSettings" style="display: none;">
                <label class="label">Şekil</label>
                <button class="tool-btn" data-arrow-path="curved" title="Eğri">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M4 20 Q 8 12, 12 12 T 20 4" stroke="currentColor" stroke-width="2" fill="none" />
                    </svg>
                </button>
                <button class="tool-btn" data-arrow-path="elbow" title="Dirsek">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M4 20 L 12 20 L 12 4 L 20 4" stroke="currentColor" stroke-width="2" fill="none" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- Canvas Settings Panel -->
        <div id="canvasSettingsPanel" class="settings-panel">
            <div class="settings-content">
                <div class="setting-item">
                    <label>Boyut:</label>
                    <select id="canvasSizeSelect">
                        <option value="a6">A6</option>
                        <option value="a5">A5</option>
                        <option value="a4">A4</option>
                        <option value="a3">A3</option>
                        <option value="letter">Letter</option>
                        <option value="full" selected>Tam Ekran</option>
                    </select>
                </div>

                <div class="setting-item">
                    <label>Oryantasyon:</label>
                    <div class="radio-group-inline">
                        <label class="radio-label-inline">
                            <input type="radio" name="orientation" value="portrait">
                            <span>Dikey</span>
                        </label>
                        <label class="radio-label-inline">
                            <input type="radio" name="orientation" value="landscape" checked>
                            <span>Yatay</span>
                        </label>
                    </div>
                </div>

                <div class="setting-item">
                    <label>Arkaplan:</label>
                    <div class="color-options">
                        <button class="color-option-small active" data-color="white" style="background: #ffffff;"
                            title="Beyaz"></button>
                        <button class="color-option-small" data-color="cream" style="background: #fffef0;"
                            title="Krem"></button>
                        <button class="color-option-small" data-color="yellow" style="background: #fffde7;"
                            title="Sarı"></button>
                        <button class="color-option-small" data-color="red" style="background: #ffebee;"
                            title="Kırmızı"></button>
                        <button class="color-option-small" data-color="blue" style="background: #e3f2fd;"
                            title="Mavi"></button>
                        <button class="color-option-small" data-color="green" style="background: #e8f5e9;"
                            title="Yeşil"></button>
                    </div>
                </div>

                <div class="setting-item">
                    <label>Desen:</label>
                    <div class="pattern-options">
                        <button class="pattern-btn active" data-pattern="none" title="Düz">⬜</button>
                        <button class="pattern-btn" data-pattern="dots" title="Noktalı">⣿</button>
                        <button class="pattern-btn" data-pattern="grid" title="Kareli">▦</button>
                        <button class="pattern-btn" data-pattern="lines" title="Çizgili">☰</button>
                    </div>
                </div>

                <button class="btn btn-primary btn-sm" id="applySettingsBtn">Uygula</button>
            </div>
        </div>

        <!-- Context Menu -->
        <div id="contextMenu" class="context-menu">
            <div class="context-menu-item" data-action="cut">
                <span class="menu-icon">✂️</span>
                <span>Kes</span>
                <span class="menu-shortcut">Ctrl+X</span>
            </div>
            <div class="context-menu-item" data-action="copy">
                <span class="menu-icon">📄</span>
                <span>Kopyala</span>
                <span class="menu-shortcut">Ctrl+C</span>
            </div>
            <div class="context-menu-item" data-action="paste">
                <span class="menu-icon">📋</span>
                <span>Yapıştır</span>
                <span class="menu-shortcut">Ctrl+V</span>
            </div>
            <div class="context-menu-separator"></div>
            <div class="context-menu-item" data-action="duplicate">
                <span class="menu-icon">📑</span>
                <span>Çoğalt</span>
                <span class="menu-shortcut">Ctrl+D</span>
            </div>
            <div class="context-menu-item" data-action="delete">
                <span class="menu-icon">🗑️</span>
                <span>Sil</span>
                <span class="menu-shortcut">Del</span>
            </div>
            <div class="context-menu-separator"></div>
            <div class="context-menu-item" data-action="flipHorizontal">
                <span class="menu-icon">↔️</span>
                <span>Yatay Döndür</span>
            </div>
            <div class="context-menu-item" data-action="flipVertical">
                <span class="menu-icon">↕️</span>
                <span>Dikey Döndür</span>
            </div>
            <div class="context-menu-separator"></div>
            <div class="context-menu-item" data-action="bringToFront">
                <span class="menu-icon">⏫</span>
                <span>En Öne Getir</span>
            </div>
            <div class="context-menu-item" data-action="bringForward">
                <span class="menu-icon">⬆️</span>
                <span>Bir Öne Getir</span>
            </div>
            <div class="context-menu-item" data-action="sendBackward">
                <span class="menu-icon">⬇️</span>
                <span>Bir Arkaya Gönder</span>
            </div>
            <div class="context-menu-item" data-action="sendToBack">
                <span class="menu-icon">⏬</span>
                <span>En Arkaya Gönder</span>
            </div>
            <div class="context-menu-separator"></div>
            <div class="context-menu-item" data-action="group">
                <span class="menu-icon">🔗</span>
                <span>Grupla</span>
            </div>
            <div class="context-menu-item" data-action="ungroup">
                <span class="menu-icon">🔓</span>
                <span>Grubu Çöz</span>
            </div>
        </div>

        <div class="canvas-container">
            <canvas id="canvas"></canvas>
        </div>

        <div class="status-bar">
            <div class="status-info">
                <span id="toolInfo">Aktif Araç: Kalem</span>
                <span class="separator">•</span>
                <span id="objectCount">Nesneler: 0</span>
                <span class="separator">•</span>
                <span id="canvasSize">Tuval: A4</span>
                <span class="separator">•</span>
                <span id="cursorPos">X: 0, Y: 0</span>
            </div>
            <div class="status-actions">
                <button class="tool-btn" id="undoBtn" title="Geri Al (Ctrl+Z)">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="lucide lucide-undo2-icon lucide-undo-2">
                        <path d="M9 14 4 9l5-5" />
                        <path d="M4 9h10.5a5.5 5.5 0 0 1 5.5 5.5a5.5 5.5 0 0 1-5.5 5.5H11" />
                    </svg>
                </button>
                <button class="tool-btn" id="redoBtn" title="İleri Al (Ctrl+Y)">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="lucide lucide-redo2-icon lucide-redo-2">
                        <path d="m15 14 5-5-5-5" />
                        <path d="M20 9H9.5A5.5 5.5 0 0 0 4 14.5A5.5 5.5 0 0 0 9.5 20H13" />
                    </svg>
                </button>
                <button class="tool-btn" id="clearBtn" title="Temizle">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="lucide lucide-trash-icon lucide-trash">
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6" />
                        <path d="M3 6h18" />
                        <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                    </svg>
                </button>
            </div>
            <div class="zoom-controls">
                <button class="zoom-btn" id="zoomOutBtn" title="Uzaklaş (-)">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <line x1="5" y1="12" x2="19" y2="12" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" />
                    </svg>
                </button>
                <button class="zoom-btn zoom-level" id="zoomResetBtn" title="Sıfırla">
                    <span id="zoomLevelDisplay">100%</span>
                </button>
                <button class="zoom-btn" id="zoomInBtn" title="Yakınlaş (+)">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <line x1="12" y1="5" x2="12" y2="19" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" />
                        <line x1="5" y1="12" x2="19" y2="12" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script src="./js/utils.js"></script>
    <script src="./js/ZoomManager.js"></script>
    <script src="./js/CanvasSettings.js"></script>
    <script src="./js/PenTool.js"></script>
    <script src="./js/LineTool.js"></script>
    <script src="./js/RectangleTool.js"></script>
    <script src="./js/EllipseTool.js"></script>
    <script src="./js/ArrowTool.js"></script>
    <script src="./js/EraserTool.js"></script>
    <script src="./js/HandTool.js"></script>
    <script src="./js/SelectTool.js"></script>
    <script src="./js/ColorPalette.js"></script>
    <script src="./js/PropertiesSidebar.js"></script>
    <script src="./js/HistoryManager.js"></script>
    <script src="./js/app.js"></script>
</body>
